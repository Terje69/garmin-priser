# Kjører scraperen automatisk og committer oppdaterte data tilbake til repoet.
#
# Tidspunktene under er i UTC (GitHub bruker alltid UTC):
#   05, 11 og 18 UTC = kl. 07, 13 og 20 norsk SOMMERTID.
#   Om vinteren blir det kl. 06, 12 og 19 norsk tid - godt nok for formålet.
#
# Du kan også starte en kjøring manuelt: Actions-fanen på GitHub
# -> "Skrap finn.no" -> "Run workflow".

name: Skrap finn.no

on:
  schedule:
    - cron: "0 5,11,18 * * *"
  workflow_dispatch:

# Workflowen trenger lov til å pushe commits tilbake til repoet
permissions:
  contents: write

# Hindrer at to kjøringer skriver til repoet samtidig
concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  skrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Hent repoet
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Kjør scraperen
        run: python scraper.py

      - name: Commit og push oppdaterte data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          # Bare commit hvis noe faktisk er endret
          if git diff --staged --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "Oppdaterte priser $(TZ=Europe/Oslo date '+%Y-%m-%d %H:%M')"
            git pull --rebase
            git push
          fi
